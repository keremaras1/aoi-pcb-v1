name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Cache Keras model weights
        uses: actions/cache@v4
        with:
          path: ~/.keras
          key: keras-mobilenetv2-${{ runner.os }}

      - name: Test with coverage
        run: pytest --cov=src/aoi_pcb --cov-report=term-missing
